<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - Sistema Acadêmico</title>
</head>
<body>
    <form action="admin.html" method="POST"> 
        <h2>Autenticação</h2>
        
        <label for="id-email">E-mail:</label><br>
        <input type="email" id="id-email" name="email" required placeholder="enviaPix@ifba.edu.br" title="Insira um e-mail válido">
        <br><br>

        <label for="id-senha">Senha:</label><br>
        <input type="password" id="id-senha" name="senha" required minlength="4" placeholder="Exemplo: 1234">
        <br><br>

        <input type="submit" value="Entrar"> 
        <input type="reset" value="Limpar"> 
    </form>

    <footer>
        <p>&copy; 2026 - IFkeys</p>
    </footer>

</body>
</html>
